<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>

  <defs>
    <!-- Violet → cyan — matches site hero gradient -->
    <linearGradient id="g" x1="3" y1="3" x2="29" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- C: bezier curve, opens to the right -->
  <path d="M16 7Q3 7 3 16Q3 25 16 25"
        stroke="url(#g)" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- V: two angled strokes meeting at a bottom point -->
  <path d="M19 7L24.5 25L30 7"
        stroke="url(#g)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
